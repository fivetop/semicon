adapter driver ftdi
ftdi_vid_pid 0x0403 0x6011
ftdi_channel 0

ftdi_layout_init 0x00c8 0x00eb
ftdi_layout_signal nSRST -data 0x0080
reset_config none
adapter speed 500

set PS_TAPID 0x04724093
# Patched cfg: -ap-num 1 for APB-AP debug access, _cores 1 to prevent SMP BP propagation
source [find kv260-zynqmp-patched.cfg]
